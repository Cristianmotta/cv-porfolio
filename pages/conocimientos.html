<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>conocimientos | portafolio profesional</title>
</head>
<body>
    <section class="conocimientos">
        <h2>Mis<span>Conocimientos</span></h2>
        <div class="skills-grid">
            <!-- Frontend -->
            <div class="skill-card frontend">
                <h3>Frontend</h3>
                <div class="skill-item">
                    <div class="skill-header">
                        <span class="skill-name">HTML</span>
                        <span class="skill-percent">90%</span>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill html"></div>
                    </div>
                </div>
                <div class="skill-item">
                    <div class="skill-header">
                        <span class="skill-name">CSS</span>
                        <span class="skill-percent">40%</span>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill css"></div>
                    </div>
                </div>
                <div class="skill-item">
                    <div class="skill-header">
                        <span class="skill-name">JavaScript</span>
                        <span class="skill-percent">20%</span>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill js"></div>
                    </div>
                </div>
            </div>
            <!-- Backend & BD -->
            <div class="skill-card backend">
                <h3>Backend & BD</h3>
                <div class="skill-item">
                    <div class="skill-header">
                        <span class="skill-name">PHP</span>
                        <span class="skill-percent">40%</span>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill php"></div>
                    </div>
                </div>
                <div class="skill-item">
                    <div class="skill-header">
                        <span class="skill-name">SQL</span>
                        <span class="skill-percent">30%</span>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill sql"></div>
                    </div>
                </div>
                <div class="skill-item">
                    <div class="skill-header">
                        <span class="skill-name">Python</span>
                        <span class="skill-percent">30%</span>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill python"></div>
                    </div>
                </div>
            </div>
            <!-- Otros -->
            <div class="skill-card otros">
                <h3>Otros</h3>
                <div class="skill-item">
                    <div class="skill-header">
                        <span class="skill-name">Laravel</span>
                        <span class="skill-percent">5%</span>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill laravel"></div>
                    </div>
                </div>
                <div class="skill-item">
                    <div class="skill-header">
                        <span class="skill-name">C++</span>
                        <span class="skill-percent">10%</span>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill cpp"></div>
                    </div>
                </div>
                <div class="skill-item">
                    <div class="skill-header">
                        <span class="skill-name">GitHub</span>
                        <span class="skill-percent">30%</span>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill github"></div>
                    </div>
                </div>
            </div>
        </div>
    </section>
</body>
</html>
